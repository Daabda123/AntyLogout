name: Build AnyTLogout

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Budowanie
        run: mvn package

      - name: Zapisz plugin
        uses: actions/upload-artifact@v4
        with:
          name: AnyTLogout
          path: target/*.jar
